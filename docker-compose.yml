networks:
  my-network:
    driver: bridge 

services:
  # --- FRONTEND (Next.js) ---
  frontend:
    container_name: fullstack-taskflow-frontend
    build: ./frontend
    networks:
      - my-network
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./frontend/.env
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:5000
      - WATCHPACK_POLLING=true 
    depends_on:
      - app

  # --- BACKEND (Express) ---
  app:
    container_name: fullstack-taskflow-app
    build: ./backend
    networks:
      - my-network
    ports:
      - ${PORT_BACKEND}:5000
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    env_file:
      - ./backend/.env
    environment:
      - PORT_BACKEND=${PORT_BACKEND}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy
    command: sh -c "npx prisma generate && npx prisma migrate deploy && npm run dev"

  # --- BANCO DE DADOS (Postgres) ---
  db:
    container_name: postgres_db 
    image: postgres:16-alpine
    networks: 
      - my-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DATABASE_PORT}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"] 
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgresql_data: